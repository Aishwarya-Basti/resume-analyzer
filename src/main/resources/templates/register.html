<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Account</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header>
    <h2>AI Resume Analyzer</h2>
    <nav>
        <a href="/">Home</a>
        <a href="/login">Login</a>
    </nav>
</header>

<section class="hero">
    <h1>Create Your Account</h1>
    <p>Register to save your profile and continue with resume analysis.</p>
    <div class="panel auth-panel" style="max-width: 750px; margin: 0 auto;">
        <div th:if="${errorMessage}" style="color: #b91c1c; margin-bottom: 12px;" th:text="${errorMessage}"></div>
        <div th:if="${successMessage}" style="color: #166534; margin-bottom: 12px;" th:text="${successMessage}"></div>

        <form th:action="@{/register}" th:object="${user}" method="post">
            <input type="text" th:field="*{fullName}" placeholder="Full name" required>
            <input type="email" th:field="*{email}" placeholder="Email" required>
            <input type="password" th:field="*{password}" placeholder="Password" required>
            <button type="submit">Create Account</button>
        </form>
        <p style="margin-top: 12px;">Already have an account? <a href="/login">Login</a></p>
    </div>
</section>
</body>
</html>
